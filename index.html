<html>
    <head>
        <title>Webspark Test Website</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/flatpickr.min.css">
        <script defer src="js/flatpickr.min.js"></script>
        <script defer src="js/script.js"></script>
    </head>
    <body>
        <header>
            <div class="container">
                <div class="header__content">
                    <a class="logo" href="/"></a>
                    <div>
                        <div class="header__title">
                            <h1>monblanproject</h1>
                            <div class="badge">Start on  17-02-2016</div>
                        </div>
                        <div class="header__stat">
                            <div><strong>870</strong> posts</div>
                            <div><strong>11,787</strong> followers</div>
                            <div><strong>112</strong> following</div>
                        </div>
                        <div class="header__filter">
                            <div class="header__filter__title">Date</div>
                            <div class="flatpickr date-from-js">
                                <input type="text" placeholder="from" data-input>
                                <a class="input-button icon-close" title="clear" data-clear>
                                </a>
                                <a class="input-button icon-calendar" title="toggle" data-toggle>
                                </a>
                            </div>
                            <div class="flatpickr date-to-js">
                                <input type="text" placeholder="to" data-input>
                                <a class="input-button icon-close" title="clear" data-clear>
                                </a>
                                <a class="input-button icon-calendar" title="toggle" data-toggle>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
    </body>
</html>
